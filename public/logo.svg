<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="0.5" cy="0.35" r="0.8">
      <stop offset="0%" stop-color="#1a1a3e" />
      <stop offset="100%" stop-color="#0a0a1a" />
    </radialGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#06b6d4" />
    </linearGradient>
    <linearGradient id="dice" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e9d5ff" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="128" fill="url(#bg)"/>
  <!-- Glow circle -->
  <circle cx="256" cy="220" r="160" fill="url(#accent)" opacity="0.15" filter="url(#glow)"/>
  
  <!-- TV Frame -->
  <g transform="translate(128, 80)" filter="url(#shadow)">
    <rect x="0" y="0" width="256" height="180" rx="28" fill="#1e1b2e" stroke="rgba(255,255,255,0.15)" stroke-width="2"/>
    <rect x="12" y="12" width="232" height="140" rx="18" fill="#0f0f1a"/>
    <!-- TV static / surprise sparkles -->
    <g opacity="0.9">
      <circle cx="60" cy="50" r="4" fill="#8b5cf6"><animate attributeName="opacity" values="0.3;1;0.3" dur="1.2s" repeatCount="indefinite"/></circle>
      <circle cx="180" cy="30" r="3" fill="#06b6d4"><animate attributeName="opacity" values="1;0.3;1" dur="1s" repeatCount="indefinite"/></circle>
      <circle cx="200" cy="90" r="5" fill="#f59e0b"><animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/></circle>
      <circle cx="40" cy="110" r="3" fill="#10b981"><animate attributeName="opacity" values="1;0.2;1" dur="1.1s" repeatCount="indefinite"/></circle>
    </g>
    <!-- Dice inside TV -->
    <g transform="translate(78, 20)">
      <!-- Dice cube -->
      <rect x="0" y="20" width="100" height="100" rx="20" fill="url(#dice)" stroke="rgba(0,0,0,0.1)" stroke-width="1"/>
      <!-- Dice dots - showing 5 as shuffle randomness -->
      <circle cx="25" cy="40" r="8" fill="#1a1a2e"/>
      <circle cx="75" cy="40" r="8" fill="#1a1a2e"/>
      <circle cx="50" cy="70" r="8" fill="#8b5cf6"/>
      <circle cx="25" cy="100" r="8" fill="#1a1a2e"/>
      <circle cx="75" cy="100" r="8" fill="#1a1a2e"/>
      <!-- Shine -->
      <ellipse cx="30" cy="28" rx="18" ry="10" fill="white" opacity="0.4"/>
    </g>
    <!-- TV footer -->
    <rect x="90" y="158" width="76" height="8" rx="4" fill="rgba(255,255,255,0.15)"/>
  </g>
  
  <!-- Gift / surprise ribbon below TV -->
  <g transform="translate(206, 280)">
    <rect x="0" y="0" width="100" height="70" rx="12" fill="url(#accent)"/>
    <rect x="0" y="12" width="100" height="14" rx="2" fill="rgba(0,0,0,0.2)"/>
    <rect x="43" y="0" width="14" height="70" rx="2" fill="rgba(0,0,0,0.2)"/>
    <!-- Bow -->
    <ellipse cx="35" cy="-8" rx="20" ry="14" fill="#f59e0b" transform="rotate(-15 35 -8)"/>
    <ellipse cx="65" cy="-8" rx="20" ry="14" fill="#fbbf24" transform="rotate(15 65 -8)"/>
    <circle cx="50" cy="-4" r="10" fill="#f59e0b"/>
  </g>
  
  <!-- Play triangle hint -->
  <g opacity="0.9" transform="translate(320, 180)">
    <circle cx="0" cy="0" r="26" fill="white" opacity="0.95"/>
    <polygon points="-8,-10 14,0 -8,10" fill="#8b5cf6"/>
  </g>
  
  <!-- Sparkles -->
  <g font-size="28" opacity="0.9">
    <text x="90" y="380" fill="#fbbf24">✦</text>
    <text x="380" y="360" fill="#06b6d4">✧</text>
    <text x="80" y="180" fill="#a78bfa" font-size="20">↻</text>
    <text x="400" y="200" fill="#a78bfa" font-size="22">↺</text>
  </g>
</svg>
